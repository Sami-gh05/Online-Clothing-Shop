{% extends 'core/base.html' %}

{% block title %}تغییر رمز عبور{% endblock %}

{% block content %}
<div class="container">
  <div class="account-page">
    {% include 'accounts/account_sidebar.html' %}

    <div class="account-content">

      <div class="page-header">
        <div>
          <h1 class="page-title">تغییر رمز عبور</h1>
          <p class="page-subtitle">رمز جدید را وارد کنید و ذخیره بزنید</p>
        </div>
      </div>

      <div class="panel form-card">
        <form method="post" class="styled-form">
          {% csrf_token %}
          {{ form.as_p }}

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">تغییر رمز</button>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
{% endblock %}
