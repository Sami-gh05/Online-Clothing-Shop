{% extends 'core/base.html' %}

{% block title %}ورود{% endblock %}

{% block content %}
<div class="container">
  <div class="auth-form">
    <div class="page-header auth-header">
      <div>
        <h1 class="page-title">ورود</h1>
        <p class="page-subtitle">به حساب کاربری خود وارد شوید</p>
      </div>
    </div>

    <div class="panel form-card">
      <form method="post" class="styled-form">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="form-actions">
          <button type="submit" class="btn btn-primary btn-block">ورود</button>
        </div>
      </form>
    </div>

    <p class="auth-hint">
      حساب ندارید؟
      <a href="{% url 'register' %}">ثبت‌نام کنید</a>
    </p>
  </div>
</div>
{% endblock %}
